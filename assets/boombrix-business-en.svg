<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="700" height="200" fill="#ffffff" rx="8"/>
  <text x="20" y="22" font-size="10" font-weight="700" fill="#6c757d" letter-spacing="1.2">BOOMBRIX — BUSINESS MODEL</text>
  <defs><marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#0F528C"/></marker></defs>
  <rect x="24" y="44" width="148" height="80" rx="8" fill="#1A1A2E"/>
  <text x="98" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">PROBLEM</text>
  <text x="98" y="86" text-anchor="middle" font-size="9" fill="#adb5bd">1M+ trees in Amsterdam</text>
  <text x="98" y="100" text-anchor="middle" font-size="9" fill="#adb5bd">50% moisture stress</text>
  <text x="98" y="114" text-anchor="middle" font-size="9" fill="#adb5bd">arborists: €40–50/hr</text>
  <line x1="172" y1="84" x2="200" y2="84" stroke="#0F528C" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="204" y="44" width="148" height="80" rx="8" fill="#0F528C"/>
  <text x="278" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">SOLUTION</text>
  <text x="278" y="86" text-anchor="middle" font-size="9" fill="#bcd4e6">IoT sensors (Arduino + GSM)</text>
  <text x="278" y="100" text-anchor="middle" font-size="9" fill="#bcd4e6">correlated with satellite NDVI</text>
  <text x="278" y="114" text-anchor="middle" font-size="9" fill="#bcd4e6">per-tree recommendations</text>
  <line x1="352" y1="84" x2="380" y2="84" stroke="#0F528C" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="384" y="44" width="148" height="80" rx="8" fill="#1A1A2E"/>
  <text x="458" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">CUSTOMERS</text>
  <text x="458" y="86" text-anchor="middle" font-size="9" fill="#adb5bd">Municipalities</text>
  <text x="458" y="100" text-anchor="middle" font-size="9" fill="#adb5bd">Private real estate</text>
  <text x="458" y="114" text-anchor="middle" font-size="9" fill="#adb5bd">with ESG obligations</text>
  <line x1="532" y1="84" x2="560" y2="84" stroke="#0F528C" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="564" y="44" width="112" height="80" rx="8" fill="#0F528C"/>
  <text x="620" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">REVENUE</text>
  <text x="620" y="86" text-anchor="middle" font-size="9" fill="#bcd4e6">we own the devices</text>
  <text x="620" y="100" text-anchor="middle" font-size="9" fill="#bcd4e6">clients subscribe</text>
  <text x="620" y="114" text-anchor="middle" font-size="9" fill="#bcd4e6">to data access</text>
  <rect x="24" y="144" width="652" height="36" rx="6" fill="#f1f5f9"/>
  <text x="70" y="162" text-anchor="middle" font-size="8" fill="#1A1A2E">University module</text>
  <line x1="116" y1="162" x2="136" y2="162" stroke="#0F528C" stroke-width="1" marker-end="url(#a)"/>
  <text x="200" y="162" text-anchor="middle" font-size="8" fill="#1A1A2E">Startup in Residence AMS</text>
  <line x1="264" y1="162" x2="284" y2="162" stroke="#0F528C" stroke-width="1" marker-end="url(#a)"/>
  <text x="338" y="162" text-anchor="middle" font-size="8" fill="#1A1A2E">Hardware + pilot</text>
  <line x1="390" y1="162" x2="410" y2="162" stroke="#0F528C" stroke-width="1" marker-end="url(#a)"/>
  <text x="464" y="162" text-anchor="middle" font-size="8" fill="#1A1A2E">SiRA Demo Day</text>
  <line x1="512" y1="162" x2="532" y2="162" stroke="#0F528C" stroke-width="1" marker-end="url(#a)"/>
  <text x="608" y="158" text-anchor="middle" font-size="8" fill="#0F528C" font-weight="700">Framework agreement</text>
  <text x="608" y="170" text-anchor="middle" font-size="8" fill="#0F528C" font-weight="700">City of Amsterdam</text>
</svg>
